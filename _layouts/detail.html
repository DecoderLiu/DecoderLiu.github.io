<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | Langchen Liu</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    :root {
      color-scheme: light;
      --ink: #14171f;
      --muted: #59616f;
      --line: rgba(20, 23, 31, 0.13);
      --blue: #2457c5;
      --amber: #9b6215;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fbfaf7 0%, #f4f6f8 100%);
    }

    a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 720;
    }

    a:hover {
      text-decoration: underline;
    }

    .shell {
      width: min(900px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid rgba(20, 23, 31, 0.08);
      background: rgba(251, 250, 247, 0.9);
    }

    .nav {
      display: flex;
      min-height: 70px;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .mark {
      color: var(--ink);
      font-weight: 760;
    }

    nav {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    main {
      padding: 72px 0 96px;
    }

    .meta {
      display: inline-flex;
      margin-bottom: 18px;
      color: var(--amber);
      font-size: 0.8rem;
      font-weight: 760;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      line-height: 1.04;
    }

    .dek {
      max-width: 760px;
      margin: 22px 0 0;
      color: #303847;
      font-size: 1.14rem;
      line-height: 1.65;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--ink);
      box-shadow: 0 10px 28px rgba(22, 30, 45, 0.06);
    }

    article {
      margin-top: 56px;
      padding-top: 36px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 34px 0 12px;
      font-size: 1.35rem;
    }

    p,
    li {
      color: #303847;
      font-size: 1.03rem;
      line-height: 1.75;
    }

    p {
      margin: 0 0 18px;
    }

    ul {
      margin: 0 0 22px;
      padding-left: 22px;
    }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #eef0f4;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    .back {
      margin-top: 48px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      nav {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell nav">
      <a class="mark" href="{{ "/" | relative_url }}">Langchen Liu</a>
      <nav aria-label="Primary navigation">
        <a href="{{ "/#research" | relative_url }}">Research</a>
        <a href="{{ "/#projects" | relative_url }}">Projects</a>
        <a href="{{ "/#publications" | relative_url }}">Publications</a>
        <a href="{{ "/blog/" | relative_url }}">Blog</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="shell">
      <span class="meta">{{ page.section_label | default: "Detail" }}</span>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p class="dek">{{ page.description }}</p>
      {% endif %}

      {% if page.links %}
      <div class="links">
        {% for link in page.links %}
        <a class="button" href="{{ link.url }}">{{ link.label }}</a>
        {% endfor %}
      </div>
      {% endif %}

      <article>
        {{ content }}
      </article>

      <p class="back"><a href="{{ "/" | relative_url }}">Back to homepage</a></p>
    </div>
  </main>
</body>
</html>
