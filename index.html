<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Langchen Liu</title>
  <meta name="description" content="Personal website of Langchen Liu.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f7f3;
      --text: #1f2933;
      --muted: #5d6673;
      --accent: #1f6feb;
      --border: #d8d5cc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101418;
        --text: #eef2f6;
        --muted: #a8b3c0;
        --accent: #7db7ff;
        --border: #2a333d;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(760px, calc(100% - 40px));
      margin: 0 auto;
      padding: 96px 0 64px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.25rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .role {
      margin: 0 0 40px;
      color: var(--muted);
      font-size: 1.2rem;
    }

    section {
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    p {
      margin: 0 0 16px;
      font-size: 1.05rem;
    }

    ul {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      padding: 0;
      margin: 28px 0 0;
      list-style: none;
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Langchen Liu</h1>
    <p class="role">PhD student in Statistics & Data Science at Yale University</p>

    <section aria-labelledby="about">
      <h2 id="about">About</h2>
      <p>
        I work on machine learning for scientific problems, including foundation models,
        large language models, federated learning, and scientific machine learning.
      </p>
      <ul aria-label="Links">
        <li><a href="mailto:langchen.liu@yale.edu">Email</a></li>
        <li><a href="https://github.com/DecoderLiu">GitHub</a></li>
        <li><a href="https://scholar.google.co.uk/citations?user=sIwtMXoAAAAJ">Google Scholar</a></li>
        <li><a href="https://twitter.com/LangchenLiu">X / Twitter</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
